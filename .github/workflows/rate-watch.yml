name: "🪙 Rate Watch"

# Scheduled health check of the rate ledger. Surfaces stale/unverified/gapped rates
# and (quarterly) a per-country authority checklist as a GitHub issue for a human to
# act on. It NEVER edits a rate — detection prompts a person; the human edits the
# ledger. Tax rates are a liability artifact, so nothing here auto-publishes.

on:
  schedule:
    # Weekly, Monday 06:00 UTC. The runner auto-switches to the fuller "quarterly"
    # report (incl. the authority checklist) during the first week of Jan/Apr/Jul/Oct.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Force report mode (weekly | quarterly); blank = auto"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: rate-watch
  cancel-in-progress: false

jobs:
  rate-watch:
    name: Rate Watch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install (lockfile-enforced)
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🔎 Analyze ledger
        id: watch
        env:
          MODE: ${{ github.event.inputs.mode }}
        run: node scripts/rate-watch/run.cjs

      - name: 📨 Open or update review issue
        if: steps.watch.outputs.should_open == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.watch.outputs.issue_title }}
          REPORT: ${{ steps.watch.outputs.report_path }}
        run: |
          set -euo pipefail
          # ensure the label exists (idempotent)
          gh label create rate-watch --color FFD33D --description "Automated tax-rate review prompts" 2>/dev/null || true
          # keep a single rolling issue rather than spamming a new one each run
          existing="$(gh issue list --label rate-watch --state open --limit 1 --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$TITLE" --body-file "$REPORT"
            gh issue comment "$existing" --body "🔄 Rate Watch refreshed this report on $(date -u +%Y-%m-%d)."
          else
            gh issue create --title "$TITLE" --body-file "$REPORT" --label rate-watch
          fi
