name: "✅ CI Quality Gate"

# Lockfile-enforced install + type-check + build (+ tests when present).
# 'npm ci' (NOT 'npm install --legacy-peer-deps') fails the PR if
# package-lock.json drifts from package.json — the class of issue behind the
# body-parser override mismatch (ai2fin-app#48).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install (lockfile-enforced)
        # 'npm ci' refuses to run if the lockfile and package.json disagree, and
        # does not silently paper over peer conflicts the way --legacy-peer-deps did.
        run: npm ci

      - name: 🧪 Type-check
        run: npm run typecheck

      - name: 🏗️ Build
        run: npm run build

      - name: 🧪 Test
        # --passWithNoTests keeps the gate green until the deferred tax tests land
        # (India §87A bands, AU FY cuts, etc.); it gates for real once they exist.
        run: npm test -- --ci --passWithNoTests
